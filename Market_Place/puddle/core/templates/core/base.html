<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>
      {% block title %}
        
      {% endblock title %}
        Puddle
    </title>
  </head>

  <body>
    <nav class="py-6 px-6 flex justify-between items-center border-b border-gray-200 shadow-xl">
      <a href="/" class="text-xl font-semibold cursor-pointer">Puddle</a>

      <div class="space-x-6">
          <a href="{% url 'item:new' %}" class="text-lg font-semibold hover:text-gray-500 cursor-pointer">New Item</a>
          <a href="{% url 'item:items' %}" class="text-lg font-semibold hover:text-gray-500 cursor-pointer">Browse</a>
          
          
          {% if request.user.is_authenticated %}
            <a href="" class="px-6 py-3 text-lg font-semibold bg-teal-500 text-white rounded-xl hover:bg-teal-700 cursor-pointer">Inbox</a>
            <a href="{% url 'dashboard:index' %}" class="px-6 py-3 text-lg font-semibold bg-gray-500 text-white rounded-xl hover:bg-gray-700 cursor-pointer">Dashboard</a>                    
          {% else %}
            <a href="{% url 'core:signup'%}" class="px-6 py-3 text-lg font-semibold bg-teal-500 text-white rounded-xl hover:bg-teal-700 cursor-pointer">Sign Up</a>
            <a href="{% url 'core:login'%}" class="px-6 py-3 text-lg font-semibold bg-gray-500 text-white rounded-xl hover:bg-gray-700 cursor-pointer">Login</a>            
          {% endif %}
      </div>
    </nav>
      
    <div class="px-6 py-6">     
      {% block content %}    
      
      {% endblock content %}        
    </div>

    <footer class="py-6 px-6 flex justify-between bg-gray-800">
      <div class="w-2/3 pr-10">
        <h3 class="mb-5 font-semibold text-gray-400 cursor-pointer">About</h3>
        <p class="text-lg text-gray-500">Lorem ipsum bjkladjk akdflaj;</p>
      </div>
      
      <div class="w-1/3">
        <h3 class="mb-5 font-semibold text-gray-400 cursor-pointer">Menu</h3>

        <ul class="space-y-2">
          <li><a href="#" class="text-lg text-teal-500 hover:text-teal-700 cursor-pointer">About</a></li>
          <li><a href="{% url 'core:contact'%}" class="text-lg text-teal-500 hover:text-teal-700 cursor-pointer">Contact</a></li>
          <li><a href="#" class="text-lg text-teal-500 hover:text-teal-700 cursor-pointer">Privacy policy</a></li>
          <li><a href="#" class="text-lg text-teal-500 hover:text-teal-700 cursor-pointer">Term of use</a></li>
        </ul>
      </div>
    </footer>
  </body>
</html>
